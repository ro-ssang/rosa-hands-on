apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<you>/gitops.git   # 본인 repo로 교체 (chart를 push한 곳)
    targetRevision: HEAD
    path: web                                        # chart 디렉터리(Chart.yaml 위치)
    helm:
      parameters:
        - name: replicaCount                         # chart values를 Application에서 오버라이드
          value: "2"
  destination:
    server: https://kubernetes.default.svc
    namespace: web-demo
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
