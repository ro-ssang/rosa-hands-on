apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-prd-kustomize
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<you>/gitops.git
    targetRevision: HEAD
    path: kustomize/overlays/prd     # overlay가 base를 참조해 replica 4로 패치
  destination:
    server: https://kubernetes.default.svc
    namespace: web-prd-k
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
