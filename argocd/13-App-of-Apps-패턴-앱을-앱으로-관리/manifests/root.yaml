apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<you>/gitops.git   # 본인 repo로 교체 (apps/ 를 push한 곳)
    targetRevision: HEAD
    path: apps                                       # 이 디렉터리의 모든 yaml = 자식 Application
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd                                # 자식은 Application 객체라 argocd ns에 생성
  syncPolicy:
    automated: { prune: true, selfHeal: true }
