apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: denied-ns
  namespace: argocd
spec:
  project: team-a                    # team-a 경계 안에 두려 하지만
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: team-b-dev            # ✗ team-a-* 패턴 위반 → project가 거부
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
