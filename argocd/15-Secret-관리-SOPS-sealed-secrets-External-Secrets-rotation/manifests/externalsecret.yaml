# "어디서 가져올지"만 Git에 둔다. ESO가 refreshInterval마다 외부 저장소를 조회해
# K8s Secret(target.name)을 만들고 갱신한다.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db
  namespace: app
spec:
  refreshInterval: 1h                # 1시간마다 외부 저장소를 다시 조회 (rotation 반영)
  secretStoreRef:
    name: aws-sm
    kind: SecretStore
  target:
    name: db                         # 생성될 K8s Secret 이름
  data:
    - secretKey: password            # K8s Secret의 키
      remoteRef:
        key: prod/db                 # Secrets Manager의 secret 이름
        property: password           # 그 안의 필드
