# kubeseal이 평문 Secret을 봉인한 결과물 — 이 파일은 Git에 커밋해도 안전하다.
# encryptedData는 클러스터 controller의 private key로만 풀린다(아무나 못 푼다).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: db
  namespace: app
spec:
  encryptedData:
    password: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...   # (실제로는 긴 암호문)
  template:
    metadata:
      name: db            # 복호화되어 생성될 K8s Secret 이름
      namespace: app
    type: Opaque
