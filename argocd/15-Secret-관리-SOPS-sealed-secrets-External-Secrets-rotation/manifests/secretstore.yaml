# External Secrets — 외부 저장소(AWS Secrets Manager)를 가리키는 연결 정의.
# 진짜 secret 값은 여기에도, Git 어디에도 없다.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-sm
  namespace: app
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: ext-secrets        # IRSA로 Secrets Manager 접근 권한을 가진 SA
