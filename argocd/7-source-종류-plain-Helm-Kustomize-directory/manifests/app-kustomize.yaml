apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kustomize
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: kustomize-guestbook       # kustomization.yaml이 있는 디렉터리
                                     # (Argo가 kustomize build로 렌더, 별도 필드 없이 자동 감지)
  destination:
    server: https://kubernetes.default.svc
    namespace: src-kustomize
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
