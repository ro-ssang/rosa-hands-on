replicaCount: 3

image:
  tag: "1.27-alpine"

config:
  LOG_LEVEL: warn
  GREETING: "hello from prod"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: my-service.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector:
  kubernetes.io/os: linux
