apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-backend
data:
  # subchartлҠ” мһҗкё° replicaCountл§Ң м•ҲлӢӨ(л¶ҖлӘЁ к°’кіј м„һмқҙм§Җ м•ҠлҠ”лӢӨ).
  own-replicaCount: {{ .Values.replicaCount | quote }}
  # globalмқҖ л¶ҖлӘЁм—җм„ң лӮҙл ӨмҳЁ кІғмқ„ к·ёлҢҖлЎң ліёлӢӨ.
  seen-global-environment: {{ .Values.global.environment | quote }}
  seen-global-domain: {{ .Values.global.domain | quote }}
