name: chart-ci

# push(main)·PR에서 검증 단계를 돌리고, my-service-* 태그를 밀면 publish까지 간다.
on:
  push:
    branches: [main]
    tags: ["my-service-*"]
  pull_request:

jobs:
  # 검증: 아래층(빠름)부터 위층(느림)으로. 하나라도 실패하면 뒤 단계는 안 돈다.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Helm v3 설치
        uses: azure/setup-helm@v4
        with:
          version: v3.21.2

      # [1] lint — 구조·필수 파일·schema 정적 검사
      - name: lint
        run: helm lint charts/my-service

      # [2] render — 기본값으로 렌더가 통과하는지
      - name: render
        run: helm template ci charts/my-service > /dev/null

      # [3] schema — 잘못된 값(replicaCount=99)은 거부돼야 정상.
      #     lint가 성공하면 schema가 뚫린 것이므로 여기서 CI를 실패시킨다.
      - name: schema (거부 확인)
        run: |
          if helm lint charts/my-service -f bad-values.yaml; then
            echo "schema가 잘못된 값을 통과시켰다"; exit 1
          fi
          echo "schema가 잘못된 값을 걸렀다"

      # [4] unit — helm-unittest, 클러스터 없이 렌더된 값 단언
      - name: unit
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest
          helm unittest charts/my-service

      # [5] integration — kind에 실제 설치하고 helm test로 동작 확인
      - name: kind 클러스터
        uses: helm/kind-action@v1
        with:
          cluster_name: rosa-lab

      - name: integration (install + test)
        run: |
          kubectl create namespace rosa-lab
          helm install ms charts/my-service -n rosa-lab --wait
          helm test ms -n rosa-lab

  # 배포: verify가 통과하고, 태그를 밀었을 때만.
  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      packages: write   # ghcr.io에 push할 권한
    steps:
      - uses: actions/checkout@v4

      - name: Helm v3 설치
        uses: azure/setup-helm@v4
        with:
          version: v3.21.2

      # [6] publish — package 후 OCI(ghcr.io)로 push. 파일명·태그는 chart version.
      - name: package & push
        run: |
          helm package charts/my-service -d dist
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push dist/my-service-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
