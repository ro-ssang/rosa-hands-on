apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-every-minute
  namespace: rosa-lab
spec:
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: hello
              image: busybox:1.37
              command:
                - sh
                - -c
                - 'echo "[$(date)] hello from $(hostname)"'
