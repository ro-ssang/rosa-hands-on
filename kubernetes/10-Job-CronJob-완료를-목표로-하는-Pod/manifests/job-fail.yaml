apiVersion: batch/v1
kind: Job
metadata:
  name: always-fail
  namespace: rosa-lab
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: fail
          image: busybox:1.37
          command:
            - sh
            - -c
            - 'echo "attempt at $(date)"; exit 1'
