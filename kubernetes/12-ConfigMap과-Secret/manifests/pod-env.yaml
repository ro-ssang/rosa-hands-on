apiVersion: v1
kind: Pod
metadata:
  name: app-env
  namespace: rosa-lab
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          echo "=== ConfigMap (envFrom) ==="
          echo "APP_NAME=$APP_NAME"
          echo "LOG_LEVEL=$LOG_LEVEL"
          echo "=== Secret (valueFrom) ==="
          echo "DB_USER=$DB_USER"
          echo "DB_PASSWORD=$DB_PASSWORD"
          sleep 3600
      envFrom:
        - configMapRef:
            name: app-config
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
