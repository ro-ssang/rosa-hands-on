apiVersion: v1
kind: Pod
metadata:
  name: app-volume
  namespace: rosa-lab
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          echo "=== /etc/config (ConfigMap) ==="
          ls -la /etc/config
          echo "--- app.properties ---"
          cat /etc/config/app.properties
          echo "=== /etc/secret (Secret) ==="
          ls -la /etc/secret
          echo "--- DB_PASSWORD ---"
          cat /etc/secret/DB_PASSWORD; echo
          sleep 3600
      volumeMounts:
        - name: config
          mountPath: /etc/config
          readOnly: true
        - name: secret
          mountPath: /etc/secret
          readOnly: true
  volumes:
    - name: config
      configMap:
        name: app-config
    - name: secret
      secret:
        secretName: app-secret
