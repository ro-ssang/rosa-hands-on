apiVersion: v1
kind: Pod
metadata:
  name: shared
  namespace: rosa-lab
spec:
  containers:
    - name: writer
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          i=0
          while true; do
            i=$((i+1))
            echo "tick $i at $(date)" >> /data/log.txt
            sleep 2
          done
      volumeMounts:
        - name: shared
          mountPath: /data
    - name: reader
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: shared
          mountPath: /data
  volumes:
    - name: shared
      emptyDir: {}
