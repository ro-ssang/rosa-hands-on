apiVersion: v1
kind: Pod
metadata:
  name: writer
  namespace: rosa-lab
spec:
  containers:
    - name: app
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          echo "written by writer at $(date)" > /data/note.txt
          sleep 3600
      volumeMounts:
        - name: store
          mountPath: /data
  volumes:
    - name: store
      persistentVolumeClaim:
        claimName: rosa-claim
