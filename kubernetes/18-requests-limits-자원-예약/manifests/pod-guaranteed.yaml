apiVersion: v1
kind: Pod
metadata:
  name: guaranteed
  namespace: rosa-lab
spec:
  containers:
    - name: app
      image: busybox:1.37
      command:
        - sh
        - -c
        - sleep 3600
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 128Mi
