apiVersion: v1
kind: Pod
metadata:
  name: oom
  namespace: rosa-lab
spec:
  restartPolicy: Never
  containers:
    - name: hog
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          echo "할당 시작 — limit 64Mi를 넘기면 커널이 끊는다"
          tail /dev/zero
      resources:
        requests:
          memory: 32Mi
        limits:
          memory: 64Mi
