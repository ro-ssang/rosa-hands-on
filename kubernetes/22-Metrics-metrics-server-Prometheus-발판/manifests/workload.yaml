# kubectl top·Metrics API에 0이 아닌 숫자가 뜨도록 CPU·메모리를 꾸준히 쓰는 워크로드.
# stress: CPU 1코어 회전 + 64Mi 메모리 점유 유지(--vm-hang 1).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load
  namespace: rosa-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: load
  template:
    metadata:
      labels:
        app: load
    spec:
      containers:
        - name: stress
          image: polinux/stress
          command: ["stress"]
          args: ["--cpu", "1", "--vm", "1", "--vm-bytes", "64M", "--vm-hang", "1"]
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: "1"
              memory: 128Mi
