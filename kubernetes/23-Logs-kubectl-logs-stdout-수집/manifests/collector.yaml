# 노드의 컨테이너 로그 파일을 그대로 tail하는 DaemonSet.
# Fluent Bit·Promtail 같은 노드 레벨 수집기가 하는 일의 핵심만 남긴 형태 —
# 어떤 앱도 건드리지 않고 /var/log 아래 파일만 읽어 모든 Pod의 stdout을 본다.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-tail
  namespace: rosa-lab
spec:
  selector:
    matchLabels:
      app: log-tail
  template:
    metadata:
      labels:
        app: log-tail
    spec:
      containers:
        - name: tail
          image: busybox
          command: ["sh", "-c"]
          args:
            - tail -n +1 -F /var/log/containers/*.log
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
