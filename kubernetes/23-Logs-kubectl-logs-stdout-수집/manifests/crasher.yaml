# 몇 줄 찍고 오류로 죽는 컨테이너. 재시작되며 CrashLoopBackOff가 되고,
# 직전에 죽은 컨테이너의 로그를 kubectl logs --previous로 볼 수 있게 한다.
apiVersion: v1
kind: Pod
metadata:
  name: crasher
  namespace: rosa-lab
  labels:
    app: crasher
spec:
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c"]
      args:
        - |
          echo "$(date -u +%FT%TZ) starting up"
          echo "$(date -u +%FT%TZ) loading config"
          sleep 15
          echo "$(date -u +%FT%TZ) FATAL cannot reach database, exiting" >&2
          exit 1
