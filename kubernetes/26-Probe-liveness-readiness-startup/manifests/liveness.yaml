apiVersion: v1
kind: Pod
metadata:
  name: liveness
  namespace: rosa-lab
  labels:
    app: liveness
spec:
  containers:
    - name: app
      image: busybox:1.36
      # 20초 동안은 healthy, 그 뒤 /tmp/healthy를 지워 liveness를 실패시킴
      args:
        - /bin/sh
        - -c
        - touch /tmp/healthy; sleep 20; rm -f /tmp/healthy; sleep 600
      livenessProbe:
        exec:
          command: ["cat", "/tmp/healthy"]
        initialDelaySeconds: 3
        periodSeconds: 5
        failureThreshold: 1
