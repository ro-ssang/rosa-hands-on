apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
  namespace: rosa-lab
  labels:
    app: site
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # 원하는 수보다 최대 1개 더 띄워도 됨
      maxUnavailable: 0    # 준비된 Pod이 4개 밑으로 내려가지 않게
  selector:
    matchLabels:
      app: site
  template:
    metadata:
      labels:
        app: site
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 2
