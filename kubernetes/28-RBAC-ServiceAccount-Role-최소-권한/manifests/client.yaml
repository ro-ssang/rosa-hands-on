apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: rosa-lab
  labels:
    app: client
spec:
  serviceAccountName: reader   # 이 Pod은 reader SA의 정체성으로 API에 말한다
  containers:
    - name: kubectl
      image: bitnami/kubectl:1.30
      command: ["sleep"]       # 기본 entrypoint(kubectl)를 덮어 그냥 대기시킴
      args: ["infinity"]
