apiVersion: v1
kind: Namespace
metadata:
  name: secure
  labels:
    # мқҙ namespaceм—җ мҳӨлҠ” PodмқҖ restricted н‘ңмӨҖмқ„ л§ҢмЎұн•ҙм•ј мғқм„ұлҗЁ
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    # л§ҢмЎұ лӘ» н•ҳл©ҙ кІҪкі л§Ң лӮҙлҠ” лӘЁл“ң(лҸ„кө¬ лӢЁкі„м—җм„ң ліҙмһ„)
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
