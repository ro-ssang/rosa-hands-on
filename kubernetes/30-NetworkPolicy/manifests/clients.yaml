apiVersion: v1
kind: Pod
metadata:
  name: frontend
  namespace: rosa-lab
  labels:
    role: frontend      # 정책에서 허용할 쪽
spec:
  containers:
    - name: c
      image: busybox:1.36
      command: ["sleep", "infinity"]
---
apiVersion: v1
kind: Pod
metadata:
  name: other
  namespace: rosa-lab
  labels:
    role: other         # 허용 목록에 없는 쪽
spec:
  containers:
    - name: c
      image: busybox:1.36
      command: ["sleep", "infinity"]
