# м„ё мӢ нҳё(metricsВ·logs)мҷҖ monitoringвҶ”observability к°„к·№мқ„ н•ң м•ұм—җм„ң ліҙкё° мң„н•ң мғҳн”Ң.
# prometheus-example-app: "/"м—җ 200, к·ё мҷё кІҪлЎңм—җ 404лҘј лҸҢл ӨмЈјкі 
# http_requests_total{code,method}В·http_request_duration_seconds нһҲмҠӨнҶ к·ёлһЁмқ„ л…ём¶ң нҸ¬л§·мңјлЎң лӮёлӢӨ.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: rosa-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: app
          image: quay.io/brancz/prometheus-example-app:v0.5.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: rosa-lab
spec:
  selector:
    app: web
  ports:
    - port: 8080
      targetPort: 8080
