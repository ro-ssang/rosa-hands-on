# trace 저장소. OTLP(gRPC 4317 · HTTP 4318)로 span을 받아 저장하고,
# HTTP 3200으로 검색(TraceQL)·조회(trace_id로 가져오기)를 연다.
# 실습용 단일 바이너리(monolithic) 구성: 로컬 파일시스템 저장.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: rosa-lab
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      max_block_duration: 5m
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: rosa-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.6.1
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - {containerPort: 3200, name: http}
            - {containerPort: 4317, name: otlp-grpc}
            - {containerPort: 4318, name: otlp-http}
          volumeMounts:
            - {name: config, mountPath: /etc/tempo}
            - {name: data, mountPath: /var/tempo}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
      volumes:
        - {name: config, configMap: {name: tempo-config}}
        - {name: data, emptyDir: {}}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: rosa-lab
spec:
  selector:
    app: tempo
  ports:
    - {port: 3200, targetPort: 3200, name: http}
    - {port: 4317, targetPort: 4317, name: otlp-grpc}
    - {port: 4318, targetPort: 4318, name: otlp-http}
