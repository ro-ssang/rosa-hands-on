# SLI/SLO를 계산할 살아 있는 트래픽.
# - web: http_requests_total(code별) counter와 latency 히스토그램을 낸다
# - load: 9번은 200, 1번은 404 -> 약 10% 비200 (availability SLI ~0.9)
# - prometheus: SLI(availability·latency)와 error budget burn rate를 recording rule로 미리 계산
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: rosa-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: app
          image: quay.io/brancz/prometheus-example-app:v0.5.0
          ports:
            - containerPort: 8080
          resources:
            requests: {cpu: 50m, memory: 32Mi}
            limits: {cpu: 200m, memory: 64Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: rosa-lab
spec:
  selector:
    app: web
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load
  namespace: rosa-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load
  template:
    metadata:
      labels:
        app: load
    spec:
      containers:
        - name: load
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                for i in 1 2 3 4 5 6 7 8 9; do wget -qO- web:8080/ >/dev/null 2>&1; done
                wget -qO- web:8080/err >/dev/null 2>&1
                sleep 0.2
              done
          resources:
            requests: {cpu: 25m, memory: 16Mi}
            limits: {cpu: 100m, memory: 32Mi}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: rosa-lab
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    rule_files:
      - /etc/prometheus/rules.yml
    scrape_configs:
      - job_name: web
        static_configs:
          - targets: ['web:8080']
  rules.yml: |
    groups:
      - name: slo
        rules:
          # SLI: availability = 좋은 요청(200) / 전체
          - record: sli:availability:ratio_rate5m
            expr: sum(rate(http_requests_total{code="200"}[5m])) / sum(rate(http_requests_total[5m]))
          # SLI: latency = 0.1초 안에 끝난 비율 (availability와 다른 경험을 잰다)
          - record: sli:latency_under_100ms:ratio_rate5m
            expr: sum(rate(http_request_duration_seconds_bucket{le="0.1"}[5m])) / sum(rate(http_request_duration_seconds_count[5m]))
          # error budget burn rate (SLO 99%): 예산 소진 속도 / 허용 속도
          - record: slo:burn:ratio_rate5m
            expr: (1 - (sum(rate(http_requests_total{code="200"}[5m])) / sum(rate(http_requests_total[5m])))) / (1 - 0.99)
          - record: slo:burn:ratio_rate1h
            expr: (1 - (sum(rate(http_requests_total{code="200"}[1h])) / sum(rate(http_requests_total[1h])))) / (1 - 0.99)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: rosa-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: c
              mountPath: /etc/prometheus
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
      volumes:
        - name: c
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: rosa-lab
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
