# 내 앱 숫자의 출처. 이 앱은 자기가 받은 요청을 client library로 직접 세어 /metrics로 낸다(instrumentation).
# http_requests_total은 개발자가 코드에 정의·증가시킨 도메인 counter다(manual). 이 앱은 런타임
# 자동 metric(go_*/process_*)을 등록하지 않아, /metrics에 개발자가 만든 것만 나온다.
# replicas를 2로 두는 건 kube-state-metrics가 그 수를 비추는지 보기 위해서다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: rosa-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: app
          image: quay.io/brancz/prometheus-example-app:v0.5.0
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: rosa-lab
  labels:
    app: web
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 8080
      targetPort: http
