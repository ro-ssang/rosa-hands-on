# remote write를 보는 두 Prometheus 구성.
# - web + load: counter 트래픽을 만든다.
# - prometheus-a(보내는 쪽): web과 자기 자신을 scrape하고, 받은 샘플을 prometheus-b로 remote_write한다.
#   queue_config(capacity·max_shards·max_samples_per_send)가 backpressure 손잡이다.
# - prometheus-b(받는 쪽): --web.enable-remote-write-receiver 로 /api/v1/write 를 연다.
#   scrape는 안 한다 — 들어오는 건 전부 A가 부친 것이다. 원격 장기 저장소 역할.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: rosa-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: app
          image: quay.io/brancz/prometheus-example-app:v0.5.0
          ports:
            - containerPort: 8080
          resources:
            requests: {cpu: 50m, memory: 32Mi}
            limits: {cpu: 200m, memory: 64Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: rosa-lab
spec:
  selector:
    app: web
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load
  namespace: rosa-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load
  template:
    metadata:
      labels:
        app: load
    spec:
      containers:
        - name: load
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                for i in 1 2 3 4 5 6 7 8 9; do wget -qO- web:8080/ >/dev/null 2>&1; done
                wget -qO- web:8080/err >/dev/null 2>&1
                sleep 0.2
              done
          resources:
            requests: {cpu: 25m, memory: 16Mi}
            limits: {cpu: 100m, memory: 32Mi}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prom-b-config
  namespace: rosa-lab
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-b
  namespace: rosa-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-b
  template:
    metadata:
      labels:
        app: prometheus-b
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-remote-write-receiver
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
      volumes:
        - name: config
          configMap:
            name: prom-b-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-b
  namespace: rosa-lab
spec:
  selector:
    app: prometheus-b
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prom-a-config
  namespace: rosa-lab
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: web
        static_configs:
          - targets: ['web:8080']
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
    remote_write:
      - url: http://prometheus-b:9090/api/v1/write
        queue_config:
          capacity: 500
          max_shards: 3
          max_samples_per_send: 100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-a
  namespace: rosa-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-a
  template:
    metadata:
      labels:
        app: prometheus-a
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
      volumes:
        - name: config
          configMap:
            name: prom-a-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-a
  namespace: rosa-lab
spec:
  selector:
    app: prometheus-a
  ports:
    - port: 9090
      targetPort: 9090
